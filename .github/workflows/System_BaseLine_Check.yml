name: Build System_Baseline_Check

on:
  workflow_dispatch:

permissions: contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: python-version: "3.11"
      - run: sudo apt-get update && sudo apt-get install -y binutils patchelf
      - run: pip install pyinstaller
      - run: |
          pyinstaller -F -n baseline Python/System_BaseLine_Check.py --exclude-module winreg
          cp dist/baseline dist/baseline-linux
      - uses: actions/upload-artifact@v4
        with:
          name: baseline-linux
          path: dist/baseline-linux

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: python-version: "3.11"
      - run: pip install pyinstaller
      - run: |
          pyinstaller -F -n baseline Python/System_BaseLine_Check.py
          copy dist\baseline.exe dist\baseline-windows.exe
      - uses: actions/upload-artifact@v4
        with:
          name: baseline-windows
          path: dist/baseline-windows.exe

  release:
    name: Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: path: artifacts
      - uses: softprops/action-gh-release@v2
        env: GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: System_BaseLine_Check
          name: System_BaseLine_Check
          draft: false
          prerelease: false
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            artifacts/baseline-linux/baseline-linux
            artifacts/baseline-windows/baseline-windows.exe
